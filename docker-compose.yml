name: echopulse

services:
  postgres:
    image: postgres:16-alpine
    container_name: echopulse-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-echopulse}
      TZ: ${TZ:-Africa/Addis_Ababa}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/01-create-n8n-db.sql:/docker-entrypoint-initdb.d/01-create-n8n-db.sql
      - ./docker/postgres/02-echopulse-schema.sql:/docker-entrypoint-initdb.d/02-echopulse-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-echopulse}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  mcp:
    build:
      context: .
      dockerfile: docker/mcp.Dockerfile
    container_name: echopulse-mcp
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-echopulse}
      MCP_HOST: 0.0.0.0
      MCP_PORT: 8000
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: echopulse-n8n
    ports:
      - "${N8N_PORT:-5678}:5678"
    environment:
      TZ: ${TZ:-Africa/Addis_Ababa}
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-postgres}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_PORT: 5678
      N8N_PROTOCOL: ${N8N_PROTOCOL:-http}
      WEBHOOK_URL: ${WEBHOOK_URL:-http://localhost:5678/}
    volumes:
      - ./n8n_data:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  streamlit:
    build:
      context: .
      dockerfile: docker/streamlit.Dockerfile
    container_name: echopulse-streamlit
    environment:
      N8N_INGEST_WEBHOOK_URL: http://n8n:5678/webhook/echopulse-ingest
      N8N_ANALYST_WEBHOOK_URL: http://n8n:5678/webhook/echopulse-agent
    ports:
      - "${STREAMLIT_PORT:-8501}:8501"
    depends_on:
      - n8n
      - mcp
    restart: unless-stopped

volumes:
  postgres_data:
